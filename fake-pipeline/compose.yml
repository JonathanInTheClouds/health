services:
  container-a:
    build:
      context: ./container-a
      dockerfile: Containerfile
    container_name: container-a
    network_mode: host
    environment:
      TCP_PORT: "5000"

  container-b:
    build:
      context: ./container-b
      dockerfile: Containerfile
    container_name: container-b
    network_mode: host
    depends_on:
      - container-a
    environment:
      TARGET_HOST: "127.0.0.1"
      TARGET_PORT: "5000"
      SEND_INTERVAL_MS: "2000"
